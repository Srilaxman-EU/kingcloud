<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KingCloud — Login</title>
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
  <script src="js/theme.js"></script>
</head>
<body class="login-page">

  <!-- Theme toggle -->
  <div class="login-theme-toggle">
    <select data-theme-select class="form-select" style="width:auto;padding:6px 28px 6px 10px;font-size:0.8rem;" aria-label="Theme">
      <option value="light">☀️ Light</option>
      <option value="dark">🌙 Dark</option>
      <option value="midnight">🌌 Midnight</option>
      <option value="forest">🌿 Forest</option>
      <option value="sunset">🌅 Sunset</option>
      <option value="rose">🌸 Rose</option>
    </select>
  </div>

  <!-- Login Card -->
  <div class="login-card" role="main">
    <!-- Logo -->
    <div class="login-logo" aria-label="KingCloud">
      <img src="assets/logo.svg" alt="KingCloud Logo" width="48" height="48" />
      <span class="login-logo-text">King<span>Cloud</span></span>
    </div>
    <p class="login-subtitle">Your personal cloud storage</p>

    <!-- Error banner -->
    <div class="login-error" id="login-error" role="alert" aria-live="polite">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>
      <span id="login-error-text"></span>
    </div>

    <!-- Form -->
    <form class="login-form" id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-with-icon">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input
            type="text"
            id="username"
            name="username"
            class="form-input"
            placeholder="Enter your username"
            autocomplete="username"
            required
            autofocus
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-with-icon">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="login-options">
        <label class="checkbox-label">
          <input type="checkbox" id="remember-me" name="remember" />
          Remember me
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-login" id="btn-login">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Sign In
      </button>
    </form>

    <p class="login-footer">KingCloud &copy; <span id="year"></span></p>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.getSession()) {
      window.location.href = 'dashboard.html';
    }

    // Set current year
    const yearEl = document.getElementById('year');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    // Theme select sync
    const themeSelect = document.querySelector('[data-theme-select]');
    if (themeSelect) {
      themeSelect.value = Theme.getTheme();
      themeSelect.addEventListener('change', () => Theme.applyTheme(themeSelect.value));
    }

    // Toggle password visibility
    const passwordInput = document.getElementById('password');
    const toggleBtn     = document.getElementById('toggle-password');
    const eyeIcon       = document.getElementById('eye-icon');

    if (toggleBtn && passwordInput) {
      toggleBtn.addEventListener('click', () => {
        const isText = passwordInput.type === 'text';
        passwordInput.type = isText ? 'password' : 'text';
        eyeIcon.innerHTML = isText
          ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
          : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      });
    }

    // Login form submit
    const loginForm  = document.getElementById('login-form');
    const loginBtn   = document.getElementById('btn-login');
    const errorBanner = document.getElementById('login-error');
    const errorText  = document.getElementById('login-error-text');

    function showError(msg) {
      if (errorText)   errorText.textContent = msg;
      if (errorBanner) errorBanner.classList.add('visible');
    }
    function hideError() {
      if (errorBanner) errorBanner.classList.remove('visible');
    }

    loginForm && loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username  = document.getElementById('username').value;
      const password  = document.getElementById('password').value;
      const remember  = document.getElementById('remember-me').checked;

      if (!username || !password) {
        showError('Please enter username and password.');
        return;
      }

      if (loginBtn) {
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> Signing in…';
      }

      try {
        const res = await Auth.login(username, password, remember);
        if (res.ok) {
          window.location.href = 'dashboard.html';
        } else {
          showError(res.error || 'Login failed.');
        }
      } catch (err) {
        showError('An unexpected error occurred.');
      } finally {
        if (loginBtn) {
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Sign In';
        }
      }
    });
  </script>
</body>
</html>
